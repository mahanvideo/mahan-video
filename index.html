<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماهان ویدئو - اشتراک گذاری ویدئو</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f0f0f0; }
        header { background: #ff0000; color: white; padding: 20px; text-align: center; }
        .search { padding: 10px; width: 80%; margin: 20px auto; display: block; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .video-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .video-card video { width: 100%; height: 180px; object-fit: cover; }
        .video-info { padding: 10px; }
        footer { text-align: center; padding: 10px; background: #333; color: white; }
    </style>
</head>
<body>
    <header>
        <h1>🌟 ماهان ویدئو</h1>
        <p>اشتراک گذاری ویدئوهای خودت!</p>
    </header>
    <input type="text" class="search" placeholder="جستجو ویدئو...">
    <div class="video-grid">
        <div class="video-card">
            <video controls>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
            <div class="video-info">
                <h3>ویدئو نمونه ۱</h3>
                <p>توضیحات ویدئو...</p>
            </div>
        </div>
        <!-- Add more cards -->
    </div>
    <footer>
        <p>© ۱۴۰۵ ماهان ویدئو - ساخته شده با ❤️</p>
    </footer>
</body>
</html>
